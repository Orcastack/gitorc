x-gitorc-security-env: &gitorc-security-env
  GITORC_REPOSITORY_IDENTITY: ${GITORC_REPOSITORY_IDENTITY:-orca:repo:3f6d8c3e-6c96-4d8c-a2d3-6f4a8f4b7f2a}
  GITORC_BUILD_HASH: ${GITORC_BUILD_HASH:-sha256:local-development}
  GITORC_SIGNING_PRIVATE_KEY_PATH: ${GITORC_SIGNING_PRIVATE_KEY_PATH:-/run/secrets/orca-signing-private.pem}
  GITORC_SIGNING_PUBLIC_KEY_PATH: ${GITORC_SIGNING_PUBLIC_KEY_PATH:-/run/secrets/orca-signing-public.pem}
  GITORC_ENFORCE_SIGNING: ${GITORC_ENFORCE_SIGNING:-false}
  GITORC_ENFORCE_DIRECTORY: ${GITORC_ENFORCE_DIRECTORY:-false}
  GITORC_LDAP_ADDRESS: ${GITORC_LDAP_ADDRESS:-ldap://ldap:389}
  GITORC_LDAP_SERVICE_ACCOUNT_DN: ${GITORC_LDAP_SERVICE_ACCOUNT_DN:-cn=service-account,ou=system,dc=orca,dc=local}
  GITORC_LDAP_SERVICE_ACCOUNT_PASSWORD_FILE: ${GITORC_LDAP_SERVICE_ACCOUNT_PASSWORD_FILE:-/run/secrets/ldap-bind-password.txt}
  GITORC_LDAP_COMPONENT_BASE_DN: ${GITORC_LDAP_COMPONENT_BASE_DN:-ou=components,dc=orca,dc=local}
  GITORC_LDAP_REPOSITORY_BASE_DN: ${GITORC_LDAP_REPOSITORY_BASE_DN:-ou=repositories,dc=orca,dc=local}
  GITORC_LDAP_AUDIT_BASE_DN: ${GITORC_LDAP_AUDIT_BASE_DN:-ou=audit,dc=orca,dc=local}
  GITORC_LDAP_AUTO_REGISTER: ${GITORC_LDAP_AUTO_REGISTER:-false}
  GITORC_RBAC_REALM: ${GITORC_RBAC_REALM:-gitorc-platform}
  GITORC_RBAC_ROLE_BASE_DN: ${GITORC_RBAC_ROLE_BASE_DN:-ou=roles,dc=orca,dc=local}
  GITORC_RBAC_REQUIRED_ROLE: ${GITORC_RBAC_REQUIRED_ROLE:-platform-service}

services:
  postgres:
    image: postgres:16-alpine
    container_name: gitorc-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gitorc}
      POSTGRES_USER: ${POSTGRES_USER:-gitorc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gitorc}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gitorc} -d ${POSTGRES_DB:-gitorc}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.10
    container_name: gitorc-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
    ports:
      - "19092:19092"
      - "9644:9644"

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: gitorc-namenode
    environment:
      CLUSTER_NAME: gitorc-hadoop
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: gitorc-datanode
    environment:
      SERVICE_PRECONDITION: namenode:9870
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    ports:
      - "9864:9864"
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    depends_on:
      - namenode

  hbase:
    image: harisekhon/hbase:latest
    container_name: gitorc-hbase
    environment:
      HBASE_MANAGES_ZK: "true"
    ports:
      - "16010:16010"
      - "9090:9090"
      - "2181:2181"
    depends_on:
      - namenode

  gateway:
    image: golang:1.24
    container_name: gitorc-gateway
    working_dir: /workspace/gitorcapi
    command: sh -c "go mod download && go run ./cmd/gitorc-gateway"
    volumes:
      - ./gitorcapi:/workspace/gitorcapi
      - ./infra/git/repos:/srv/git
      - ./infra/security:/run/secrets:ro
    environment:
      GITORC_GATEWAY_HTTP_PORT: 8080
      GITORC_GATEWAY_GRPC_PORT: 9080
      GITORC_GATEWAY_IDENTITY: ${GITORC_GATEWAY_IDENTITY:-orca:service:4c3f7ef4-bf28-4dc0-903c-b3cfd4fdd9b4}
      GITORC_REPO_ROOT: /srv/git
      GITORC_REPO_PUBLIC_ROOT: ${PWD:-/workspace}/infra/git/repos
      GITORC_PUBLIC_GIT_BASE: http://localhost:8080/git
      <<: *gitorc-security-env
    ports:
      - "8080:8080"
      - "9080:9080"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

  git-service:
    image: golang:1.24
    container_name: gitorc-git-service
    working_dir: /workspace/gitorcapi
    command: sh -c "go mod download && go run ./cmd/gitorc-git-service"
    volumes:
      - ./gitorcapi:/workspace/gitorcapi
      - ./infra/git/repos:/srv/git
      - ./infra/security:/run/secrets:ro
    environment:
      GITORC_GIT_HTTP_PORT: 8081
      GITORC_GIT_GRPC_PORT: 9081
      GITORC_GIT_IDENTITY: ${GITORC_GIT_IDENTITY:-orca:service:dce9129f-783a-4816-8ee1-8676fa5192a8}
      <<: *gitorc-security-env
    ports:
      - "8081:8081"
      - "9081:9081"
    depends_on:
      postgres:
        condition: service_healthy

  review-service:
    image: golang:1.24
    container_name: gitorc-review-service
    working_dir: /workspace/gitorcapi
    command: sh -c "go mod download && go run ./cmd/gitorc-review-service"
    volumes:
      - ./gitorcapi:/workspace/gitorcapi
      - ./infra/security:/run/secrets:ro
    environment:
      GITORC_REVIEW_HTTP_PORT: 8082
      GITORC_REVIEW_GRPC_PORT: 9082
      GITORC_REVIEW_IDENTITY: ${GITORC_REVIEW_IDENTITY:-orca:service:4cc2c0ec-0af8-4d25-a565-a301e2e8f324}
      <<: *gitorc-security-env
    ports:
      - "8086:8082"
      - "9082:9082"
    depends_on:
      git-service:
        condition: service_started

  ci-service:
    image: golang:1.24
    container_name: gitorc-ci-service
    working_dir: /workspace/gitorcapi
    command: sh -c "go mod download && go run ./cmd/gitorc-ci-service"
    volumes:
      - ./gitorcapi:/workspace/gitorcapi
      - ./infra/artifacts:/workspace/artifacts
      - ./infra/security:/run/secrets:ro
    environment:
      GITORC_CI_HTTP_PORT: 8083
      GITORC_CI_GRPC_PORT: 9083
      GITORC_CI_IDENTITY: ${GITORC_CI_IDENTITY:-orca:service:71f1ba7b-db62-4369-a133-7be30c1d9e2d}
      <<: *gitorc-security-env
    ports:
      - "8083:8083"
      - "9083:9083"
    depends_on:
      redpanda:
        condition: service_started
      hbase:
        condition: service_started

  cd-service:
    image: golang:1.24
    container_name: gitorc-cd-service
    working_dir: /workspace/gitorcapi
    command: sh -c "go mod download && go run ./cmd/gitorc-cd-service"
    volumes:
      - ./gitorcapi:/workspace/gitorcapi
      - ./infra/deploy:/workspace/deploy
      - ./infra/security:/run/secrets:ro
    environment:
      GITORC_CD_HTTP_PORT: 8084
      GITORC_CD_GRPC_PORT: 9084
      GITORC_CD_IDENTITY: ${GITORC_CD_IDENTITY:-orca:service:dd3490dc-e08d-43bb-abaf-2874e46ad7ec}
      <<: *gitorc-security-env
    ports:
      - "8084:8084"
      - "9084:9084"
    depends_on:
      ci-service:
        condition: service_started

  analytics-service:
    image: golang:1.24
    container_name: gitorc-analytics-service
    working_dir: /workspace/gitorcapi
    command: sh -c "go mod download && go run ./cmd/gitorc-analytics-service"
    volumes:
      - ./gitorcapi:/workspace/gitorcapi
      - ./infra/security:/run/secrets:ro
    environment:
      GITORC_ANALYTICS_HTTP_PORT: 8085
      GITORC_ANALYTICS_GRPC_PORT: 9085
      GITORC_ANALYTICS_IDENTITY: ${GITORC_ANALYTICS_IDENTITY:-orca:service:f4ea4140-9117-4351-b0f4-71d90b4cd0b5}
      <<: *gitorc-security-env
    ports:
      - "8085:8085"
      - "9085:9085"
    depends_on:
      hbase:
        condition: service_started

  web:
    image: node:20-alpine
    container_name: gitorc-web
    working_dir: /workspace/gitorcweb
    command: sh -c "npm install && npm run build && npm run preview -- --host 0.0.0.0 --port 5050"
    volumes:
      - ./gitorcweb:/workspace/gitorcweb
      - gitorcweb_node_modules:/workspace/gitorcweb/node_modules
    ports:
      - "5050:5050"
    depends_on:
      gateway:
        condition: service_started

volumes:
  postgres_data:
  hadoop_namenode:
  hadoop_datanode:
  gitorcweb_node_modules:
