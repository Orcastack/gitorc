apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitorc-runner
  annotations:
    gitorc.io/identity-mode: keystone-linked
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitorc-runner-controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitorc-runner-controller
  template:
    metadata:
      labels:
        app: gitorc-runner-controller
        gitorc.io/scheduling: private-cloud
    spec:
      serviceAccountName: gitorc-runner
      containers:
        - name: runner-controller
          image: registry.internal.example/gitorc/runner-controller:latest
          args:
            - --queue=governed-pipelines
            - --identity-provider=keystone
            - --executor=kubernetes
            - --artifact-volume=/var/lib/gitorc/artifacts
          volumeMounts:
            - name: artifacts
              mountPath: /var/lib/gitorc/artifacts
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: gitorc-artifacts