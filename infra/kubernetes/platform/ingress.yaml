apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitorc-gateway
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 256m
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  tls:
    - hosts:
        - gitorc.internal.example
      secretName: gitorc-ingress-tls
  rules:
    - host: gitorc.internal.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitorc-gateway
                port:
                  number: 8080