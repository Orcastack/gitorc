apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitorc-ci-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitorc-ci-service
  template:
    metadata:
      labels:
        app: gitorc-ci-service
        gitorc.io/stage: build-test-sign
    spec:
      serviceAccountName: gitorc-runner
      containers:
        - name: ci-service
          image: registry.internal.example/gitorc/ci-service:latest
          env:
            - name: GITORC_EXECUTION_MODE
              value: private-cloud
            - name: GITORC_SIGNING_REQUIRED
              value: "true"
            - name: GITORC_POLICY_ENDPOINT
              value: http://opa.gitorc-system.svc.cluster.local:8181
          volumeMounts:
            - name: artifacts
              mountPath: /workspace/artifacts
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: gitorc-artifacts
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitorc-cd-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitorc-cd-service
  template:
    metadata:
      labels:
        app: gitorc-cd-service
        gitorc.io/stage: deploy-runtime
    spec:
      serviceAccountName: gitorc-runner
      containers:
        - name: cd-service
          image: registry.internal.example/gitorc/cd-service:latest
          env:
            - name: GITORC_DEPLOYMENT_ENVS
              value: dev,stage,prod
            - name: GITORC_ROLLBACK_ENABLED
              value: "true"
            - name: GITORC_POLICY_ENDPOINT
              value: http://opa.gitorc-system.svc.cluster.local:8181