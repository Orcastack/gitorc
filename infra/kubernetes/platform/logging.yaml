apiVersion: v1
kind: ConfigMap
metadata:
  name: gitorc-log-pipeline
data:
  vector.yaml: |
    sources:
      kubernetes_logs:
        type: kubernetes_logs
    transforms:
      gitorc_only:
        type: filter
        inputs: [kubernetes_logs]
        condition: '.kubernetes.pod_namespace == "gitorc-system"'
    sinks:
      loki:
        type: loki
        inputs: [gitorc_only]
        endpoint: http://loki.gitorc-system.svc.cluster.local:3100
        encoding:
          codec: json
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gitorc-log-agent
spec:
  selector:
    matchLabels:
      app: gitorc-log-agent
  template:
    metadata:
      labels:
        app: gitorc-log-agent
    spec:
      serviceAccountName: gitorc-runner
      containers:
        - name: vector
          image: timberio/vector:0.40.0-alpine
          volumeMounts:
            - name: config
              mountPath: /etc/vector
      volumes:
        - name: config
          configMap:
            name: gitorc-log-pipeline