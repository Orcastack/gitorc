- name: Reconcile Rancher lifecycle controls for GITORC-managed clusters
  hosts: rancher_management
  become: false
  vars:
    rancher_cluster_name: gitorc-private-cloud
    rancher_project_name: platform-ops
    rancher_upgrade_channel: stable
  tasks:
    - name: Ensure Rancher cluster registration request exists
      ansible.builtin.uri:
        url: "{{ gitorc_rancher_server_url }}/v3/clusters"
        method: POST
        body_format: json
        headers:
          Authorization: "Bearer {{ lookup('env', 'RANCHER_BEARER_TOKEN') }}"
        body:
          type: cluster
          name: "{{ rancher_cluster_name }}"
          rancherKubernetesEngineConfig: {}
        status_code:
          - 200
          - 201

    - name: Synchronize Rancher project metadata for RBAC mapping
      ansible.builtin.uri:
        url: "{{ gitorc_rancher_server_url }}/v3/projects"
        method: POST
        body_format: json
        headers:
          Authorization: "Bearer {{ lookup('env', 'RANCHER_BEARER_TOKEN') }}"
        body:
          clusterId: "local"
          name: "{{ rancher_project_name }}"
          description: Managed by GITORC for multi-cluster governance and RBAC projection.
        status_code:
          - 200
          - 201
          - 422

    - name: Record Rancher upgrade policy for cluster operators
      ansible.builtin.copy:
        dest: /tmp/gitorc-rancher-upgrade-policy.json
        mode: "0644"
        content: |
          {
            "cluster": "{{ rancher_cluster_name }}",
            "upgrade_channel": "{{ rancher_upgrade_channel }}",
            "node_lifecycle": "gitorc-governed",
            "monitoring": "prometheus-grafana",
            "rbac_source": "keystone-linked"
          }
