name: gitorc validation

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  api-build:
    runs-on: ubuntu-latest
    env:
      GITORC_REPOSITORY_IDENTITY: orca:repo:3f6d8c3e-6c96-4d8c-a2d3-6f4a8f4b7f2a

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build API services
      run: |
        cd gitorcapi
        go mod tidy
        mkdir -p dist
        go build -o dist/gitorc-gateway ./cmd/gitorc-gateway
        go build -o dist/gitorc-git-service ./cmd/gitorc-git-service
        go build -o dist/gitorc-review-service ./cmd/gitorc-review-service
        go build -o dist/gitorc-ci-service ./cmd/gitorc-ci-service
        go build -o dist/gitorc-cd-service ./cmd/gitorc-cd-service
        go build -o dist/gitorc-analytics-service ./cmd/gitorc-analytics-service
        go build -o dist/gitorc-secctl ./cmd/gitorc-secctl

    - name: Generate signing keys
      run: |
        cd gitorcapi
        ./dist/gitorc-secctl genkeys --private dist/signing/private.pem --public dist/signing/public.pem

    - name: Generate API attestations
      run: |
        cd gitorcapi
        mkdir -p dist/attestations
        ./dist/gitorc-secctl attest --repository-identity "$GITORC_REPOSITORY_IDENTITY" --component-identity orca:service:4c3f7ef4-bf28-4dc0-903c-b3cfd4fdd9b4 --binary-path dist/gitorc-gateway --build-reference "${GITHUB_SHA}:gitorc-gateway" --private-key dist/signing/private.pem --public-key dist/signing/public.pem --output dist/attestations/gateway.json
        ./dist/gitorc-secctl attest --repository-identity "$GITORC_REPOSITORY_IDENTITY" --component-identity orca:service:dce9129f-783a-4816-8ee1-8676fa5192a8 --binary-path dist/gitorc-git-service --build-reference "${GITHUB_SHA}:gitorc-git-service" --private-key dist/signing/private.pem --public-key dist/signing/public.pem --output dist/attestations/git-service.json
        ./dist/gitorc-secctl attest --repository-identity "$GITORC_REPOSITORY_IDENTITY" --component-identity orca:service:4cc2c0ec-0af8-4d25-a565-a301e2e8f324 --binary-path dist/gitorc-review-service --build-reference "${GITHUB_SHA}:gitorc-review-service" --private-key dist/signing/private.pem --public-key dist/signing/public.pem --output dist/attestations/review-service.json
        ./dist/gitorc-secctl attest --repository-identity "$GITORC_REPOSITORY_IDENTITY" --component-identity orca:service:71f1ba7b-db62-4369-a133-7be30c1d9e2d --binary-path dist/gitorc-ci-service --build-reference "${GITHUB_SHA}:gitorc-ci-service" --private-key dist/signing/private.pem --public-key dist/signing/public.pem --output dist/attestations/ci-service.json
        ./dist/gitorc-secctl attest --repository-identity "$GITORC_REPOSITORY_IDENTITY" --component-identity orca:service:dd3490dc-e08d-43bb-abaf-2874e46ad7ec --binary-path dist/gitorc-cd-service --build-reference "${GITHUB_SHA}:gitorc-cd-service" --private-key dist/signing/private.pem --public-key dist/signing/public.pem --output dist/attestations/cd-service.json
        ./dist/gitorc-secctl attest --repository-identity "$GITORC_REPOSITORY_IDENTITY" --component-identity orca:service:f4ea4140-9117-4351-b0f4-71d90b4cd0b5 --binary-path dist/gitorc-analytics-service --build-reference "${GITHUB_SHA}:gitorc-analytics-service" --private-key dist/signing/private.pem --public-key dist/signing/public.pem --output dist/attestations/analytics-service.json

    - name: Upload signed API artifacts
      uses: actions/upload-artifact@v4
      with:
        name: gitorc-api-signed
        path: gitorcapi/dist

  infra-validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.8.5

    - name: Terraform format check
      run: terraform fmt -check -recursive infra/terraform

    - name: Terraform validate private cloud environment
      run: |
        terraform -chdir=infra/terraform/environments/private-cloud init -backend=false
        terraform -chdir=infra/terraform/environments/private-cloud validate

    - name: Verify deployment environments exist
      run: |
        test -f infra/deploy/environments/private-cloud-dev.yaml
        test -f infra/deploy/environments/private-cloud-stage.yaml
        test -f infra/deploy/environments/private-cloud-prod.yaml
        test -f infra/automation/workflows/cloud-bootstrap.yaml
        test -f infra/ansible/playbooks/proxmox-bootstrap.yml
        test -f infra/ansible/playbooks/network-fabric.yml
        test -f infra/ansible/playbooks/rancher-register.yml
        test -f infra/kubernetes/platform/gpu-support.yaml

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Ansible
      run: pip install ansible-core==2.17.3

    - name: Ansible syntax check
      run: |
        ansible-playbook --syntax-check -i infra/ansible/inventories/private-cloud/hosts.yml infra/ansible/playbooks/proxmox-bootstrap.yml
        ansible-playbook --syntax-check -i infra/ansible/inventories/private-cloud/hosts.yml infra/ansible/playbooks/openstack-control-plane.yml
        ansible-playbook --syntax-check -i infra/ansible/inventories/private-cloud/hosts.yml infra/ansible/playbooks/network-fabric.yml
        ansible-playbook --syntax-check -i infra/ansible/inventories/private-cloud/hosts.yml infra/ansible/playbooks/kubernetes-cluster.yml
        ansible-playbook --syntax-check -i infra/ansible/inventories/private-cloud/hosts.yml infra/ansible/playbooks/rancher-register.yml
        ansible-playbook --syntax-check -i infra/ansible/inventories/private-cloud/hosts.yml infra/ansible/playbooks/gpu-workers.yml

    - name: Evaluate runtime policy
      uses: open-policy-agent/setup-opa@v2
      with:
        version: latest

    - name: Run OPA policy gate
      run: opa eval --fail-defined --data infra/policy/opa/runtime-governance.rego --input infra/policy/examples/stage-approval-input.json 'data.gitorc.runtime.deny'

    - name: Render platform manifests
      run: kubectl kustomize infra/kubernetes/platform >/tmp/gitorc-platform.yaml

  web-build:
    runs-on: ubuntu-latest
    env:
      GITORC_REPOSITORY_IDENTITY: orca:repo:3f6d8c3e-6c96-4d8c-a2d3-6f4a8f4b7f2a

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: gitorcweb/package-lock.json

    - name: Install dependencies
      run: |
        cd gitorcweb
        npm ci

    - name: Set up Go for attestation tool
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build frontend
      run: |
        cd gitorcweb
        npm run build

    - name: Sign frontend build
      run: |
        cd gitorcapi
        mkdir -p dist/web-signing
        go run ./cmd/gitorc-secctl genkeys --private dist/web-signing/private.pem --public dist/web-signing/public.pem
        go run ./cmd/gitorc-secctl attest --repository-identity "$GITORC_REPOSITORY_IDENTITY" --component-identity orca:service:6fb4b8d3-32e3-4725-bd52-db9f5a6d0f14 --binary-path ../gitorcweb/dist/index.html --build-reference "${GITHUB_SHA}:gitorcweb" --private-key dist/web-signing/private.pem --public-key dist/web-signing/public.pem --output ../gitorcweb/dist/orca-attestation.json

    - name: Upload signed frontend artifact
      uses: actions/upload-artifact@v4
      with:
        name: gitorc-web-signed
        path: |
          gitorcweb/dist
          gitorcapi/dist/web-signing/public.pem

  release-assets-smoke:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Install package tools
      run: |
        sudo apt-get update
        sudo apt-get install -y rpm dpkg-dev apt-utils

    - name: Build release assets
      run: bash ./scripts/release/build-release.sh "${GITHUB_REF_NAME#v}"

    - name: Build apt metadata
      run: bash ./scripts/release/update-apt-repo.sh "${GITHUB_REF_NAME#v}"
